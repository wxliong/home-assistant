ambience_with_master_off:
  alias: Ambience with Master Off
  sequence:
  - target:
      entity_id: switch.master_switch
    action: switch.turn_off
  - delay:
      milliseconds: 500
  - target:
      entity_id: switch.ambience
    action: switch.turn_on
  mode: single
  icon: mdi:floor-lamp
  description: ''
arrival_lg_tv_spotify:
  alias: Arrival - TV open Spotify and play
  mode: single
  sequence:
  - action: media_player.turn_on
    target:
      entity_id: media_player.living_room_tv_oled55g4
  - wait_template: '{{ states(''media_player.living_room_tv_oled55g4'') != ''off''
      }}'
    timeout: 00:00:30
    continue_on_timeout: true
  - delay:
      hours: 0
      minutes: 0
      seconds: 8
      milliseconds: 0
  - action: webostv.select_sound_output
    continue_on_error: true
    data:
      entity_id: media_player.living_room_tv_oled55g4
      sound_output: bt_soundbar
    response_variable: sound_output
  - delay:
      hours: 0
      minutes: 0
      seconds: 5
      milliseconds: 0
  - wait_template: '{{ state_attr(''media_player.living_room_tv_oled55g4'',''sound_output'')
      in [''bt_soundbar'',''tv_speaker''] }}

      '
    timeout: 00:00:5
    continue_on_timeout: true
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ state_attr(''media_player.living_room_tv_oled55g4'',''sound_output'')
          == ''bt_soundbar'' }}

          '
      sequence:
      - action: media_player.volume_set
        target:
          entity_id: media_player.living_room_tv_oled55g4
        data:
          volume_level: 0.4
    default:
    - action: media_player.volume_set
      target:
        entity_id: media_player.living_room_tv_oled55g4
      data:
        volume_level: 0.12
  - delay: 00:00:02
  - action: media_player.select_source
    target:
      entity_id: media_player.living_room_tv_oled55g4
    data:
      source: Spotify - Music and Podcasts
  - wait_template: '{{ state_attr(''media_player.living_room_tv_oled55g4'',''source'')
      == ''Spotify - Music and Podcasts'' }}

      '
    timeout: 00:00:20
    continue_on_timeout: true
  - delay: 00:00:03
  - action: media_player.media_play
    target:
      entity_id: media_player.living_room_tv_oled55g4
  - delay: 00:00:02
  - action: webostv.button
    data:
      entity_id: media_player.living_room_tv_oled55g4
      button: PLAY
