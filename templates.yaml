- sensor:
    - name: date_string
      state: >
        {{ now().strftime('%a, %d %b %Y') }}

    - name: "Updates Count"
      unique_id: updates_count
      icon: mdi:arrow-up-bold-circle
      state: >
        {{ states.update
           | selectattr('state','eq','on')
           | list
           | count }}

- light:
    # =========================
    # BALCONY
    # switch.living_room_left_switch_left -> light.balcony
    # =========================
    - name: "Balcony (Hybrid)"
      unique_id: balcony_hybrid

      state: "{{ is_state('switch.living_room_left_switch_left', 'on') }}"

      level: "{{ state_attr('light.balcony', 'brightness') | int(0) }}"
      temperature: "{{ state_attr('light.balcony', 'color_temp') | int(250) }}"
      hs: >
        {% if state_attr('light.balcony', 'color_mode') == 'hs' %}
          {{ state_attr('light.balcony', 'hs_color') }}
        {% else %}
          {{ none }}
        {% endif %}

      turn_on:
        action: switch.turn_on
        target:
          entity_id: switch.living_room_left_switch_left

      turn_off:
        action: switch.turn_off
        target:
          entity_id: switch.living_room_left_switch_left

      set_level:
        action: light.turn_on
        target:
          entity_id: light.balcony
        data:
          brightness: "{{ brightness }}"

      set_temperature:
        action: light.turn_on
        target:
          entity_id: light.balcony
        data:
          color_temp: "{{ color_temp }}"

      set_hs:
        action: light.turn_on
        target:
          entity_id: light.balcony
        data:
          hs_color:
            - "{{ hs[0] }}"
            - "{{ hs[1] }}"

